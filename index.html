<!DOCTYPE html>
<html>
<head>
  <title>AI Browser Tool ULTRA</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body style="font-family:sans-serif;text-align:center;padding:15px;">

<h2>🚀 AI Browser Tool</h2>

<input id="url" placeholder="https://example.com" style="width:90%">
<br>
<button onclick="generateQR()">QR</button>
<button onclick="openSite()">Open</button>

<canvas id="qrcode"></canvas>

<hr>

<textarea id="htmlCode" style="width:95%;height:100px;"></textarea><br>
<button onclick="runHTML()">Run HTML</button>

<textarea id="jsCode" style="width:95%;height:100px;"></textarea><br>
<button onclick="runJS()">Run JS</button>

<input type="file" onchange="loadFile(event)">

<hr>

<button onclick="enableEdit()">Edit Page</button>
<button onclick="enableHighlight()">Highlight</button>

<hr>

<textarea id="aiInput" style="width:95%;height:120px;"></textarea><br>
<button onclick="aiTranslate()">Translate</button>
<button onclick="aiSummarize()">Summarize</button>
<button onclick="scanRisk()">Scan Risk</button>

<pre id="output"></pre>

<hr>

<iframe id="preview" style="width:100%;height:250px;"></iframe>

<script>
const API_URL = "https://YOUR-RENDER-URL.onrender.com/ai";

function fixURL(u){ return u.startsWith("http") ? u : "https://" + u; }

function generateQR(){ QRCode.toCanvas(qrcode, fixURL(url.value)); }

function openSite(){ window.open(fixURL(url.value)); }

function runHTML(){ preview.srcdoc = htmlCode.value; }

function runJS(){ try{ new Function(jsCode.value)(); } catch(e){ alert(e.message); } }

function loadFile(e){
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = e => {
    if(f.name.endsWith(".js")) jsCode.value = e.target.result;
    else htmlCode.value = e.target.result;
  };
  r.readAsText(f);
}

function enableEdit(){ document.body.contentEditable = true; }

function enableHighlight(){
  document.addEventListener("mouseup", ()=>{
    let s = window.getSelection();
    if(s.rangeCount){
      let span=document.createElement("span");
      span.style.background="yellow";
      try{s.getRangeAt(0).surroundContents(span);}catch(e){}
    }
  });
}

async function callAI(prompt){
  const r = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt})
  });
  return r.json();
}

async function aiTranslate(){
  let r = await callAI("Translate to English:\\n"+aiInput.value);
  output.innerText = r.result;
}

async function aiSummarize(){
  let r = await callAI("Explain this code:\\n"+aiInput.value);
  output.innerText = r.result;
}

function scanRisk(){
  let t = aiInput.value, r="";
  if(t.includes("eval")) r+="⚠️ eval used\n";
  if(t.includes("cookie")) r+="⚠️ cookies\n";
  if(t.includes("fetch")) r+="🌐 network\n";
  if(t.includes("localStorage")) r+="💾 storage\n";
  if(!r) r="No major risks";
  output.innerText=r;
}
</script>

</body>
</html>

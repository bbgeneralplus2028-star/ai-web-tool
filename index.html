<!DOCTYPE html>
<html>
<head>
  <title>AI Web Runner FIXED</title>

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input, textarea { width: 90%; padding: 10px; margin: 5px; }
    button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    iframe { width: 95%; height: 300px; border: 2px solid black; margin-top: 10px; }
    #output { white-space: pre-wrap; text-align: left; margin-top: 10px; }
  </style>
</head>

<body>

<h2>🌐 HTML + AI Web Runner (FIXED)</h2>

<!-- 🌍 URL INPUT -->
<input id="url" placeholder="https://example.com">
<br>

<button onclick="openSite()">🌍 Open Website</button>
<button onclick="embedSite()">📱 Embed Site</button>

<hr>

<!-- 💻 HTML RUNNER -->
<textarea id="code" placeholder="<h1>Hello World</h1>"></textarea>
<br>

<button onclick="runHTML()">▶ Run HTML</button>
<button onclick="clearFrame()">🧹 Clear</button>

<hr>

<!-- OUTPUT -->
<iframe id="preview"></iframe>

<div id="output"></div>

<script>

// ===============================
// 🔧 FIXED URL HANDLER
// ===============================
function fixURL(u){
  if(!u) return "";
  return u.startsWith("http") ? u : "https://" + u;
}

// ===============================
// 🌍 OPEN WEBSITE (FIXED)
// ===============================
function openSite(){
  const urlInput = document.getElementById("url");
  let url = fixURL(urlInput.value);

  if(!url){
    alert("Please enter a website URL");
    return;
  }

  const win = window.open(url, "_blank");

  // fallback if popup blocked
  if(!win){
    window.location.href = url;
  }
}

// ===============================
// 📱 EMBED WEBSITE
// ===============================
function embedSite(){
  const url = document.getElementById("url").value;
  const fixed = fixURL(url);

  if(!fixed){
    alert("Enter a valid URL");
    return;
  }

  document.getElementById("preview").src = fixed;
}

// ===============================
// 💻 RUN HTML
// ===============================
function runHTML(){
  const code = document.getElementById("code").value;
  document.getElementById("preview").srcdoc = code;
}

// ===============================
// 🧹 CLEAR
// ===============================
function clearFrame(){
  document.getElementById("preview").srcdoc = "";
  document.getElementById("preview").src = "";
}

</script>

</body>
</html>

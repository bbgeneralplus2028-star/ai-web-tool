<!DOCTYPE html>
<html>
<head>
  <title>AI FULL SYSTEM PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; padding: 15px; background:#111; color:white; }
    input, textarea, select { width: 90%; padding: 10px; margin: 5px; border-radius:6px; border:none; }
    button { padding: 10px; margin: 5px; cursor:pointer; border-radius:6px; }
    iframe { width: 95%; height: 280px; border: 2px solid #444; margin-top: 10px; }
    #chat { max-width:600px; margin:auto; text-align:left; }
    .msg { padding:8px; margin:5px; border-radius:6px; }
    .user { background:#333; }
    .ai { background:#1e3a8a; }
    pre { text-align:left; white-space:pre-wrap; background:#000; padding:10px; border-radius:6px; }
  </style>
</head>

<body>

<h2>🚀 AI FULL SYSTEM PRO</h2>

<!-- AI CHAT -->
<div id="chat"></div>
<input id="msg" placeholder="Ask AI...">
<br>
<button onclick="sendAI()">Send AI</button>

<hr>

<!-- WEB TOOL -->
<input id="url" placeholder="https://example.com">
<br>
<button onclick="openSite()">🌍 Open</button>
<button onclick="embedSite()">📱 Embed</button>

<hr>

<!-- HTML RUNNER -->
<textarea id="htmlCode" placeholder="<h1>Hello</h1>"></textarea>
<br>
<button onclick="runHTML()">▶ Run HTML</button>
<button onclick="clearFrame()">🧹 Clear</button>

<hr>

<!-- QR -->
<input id="qrInput" placeholder="Enter URL">
<br>
<button onclick="qrNormal()">🌐 QR</button>
<button onclick="qrAI()">🤖 AI QR</button>
<canvas id="qr"></canvas>
<p id="qrInfo"></p>

<hr>

<!-- API TESTER -->
<h3>🧪 API TESTER (My Postman)</h3>

<input id="apiUrl" placeholder="/ai OR full https:// URL">

<select id="method">
  <option>POST</option>
  <option>GET</option>
</select>

<textarea id="body" placeholder='{"prompt":"hello"}'></textarea>

<button onclick="sendRequest()">🚀 Send Request</button>

<pre id="response"></pre>

<hr>

<iframe id="preview"></iframe>

<script>

// ================= AI CHAT =================
const API_URL = "/ai";

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}

async function sendAI(){
  const text=document.getElementById("msg").value.trim();
  if(!text) return;

  addMsg("You: "+text,"user");

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt:text})
    });

    const data=await res.json();
    addMsg("AI: "+(data.result||"No response"),"ai");

  }catch(e){
    addMsg("Error: "+e.message,"ai");
  }
}

// ================= WEB =================
function fix(u){
  u = u.trim();
  if(!u.startsWith("http")) u = "https://" + u;
  return u;
}

function openSite(){
  let u = fix(document.getElementById("url").value);
  window.open(u,"_blank");
}

function embedSite(){
  let u = fix(document.getElementById("url").value);
  document.getElementById("preview").src = u;
}

// ================= HTML =================
function runHTML(){
  document.getElementById("preview").srcdoc =
    document.getElementById("htmlCode").value;
}

function clearFrame(){
  document.getElementById("preview").src = "";
  document.getElementById("preview").srcdoc = "";
}

// ================= QR =================
function qrNormal(){
  let u = fix(document.getElementById("qrInput").value);
  QRCode.toCanvas(document.getElementById("qr"),u);
  document.getElementById("qrInfo").innerText="🌐 Normal QR";
}

function qrAI(){
  let u = window.location.origin + "/ai-mode";
  QRCode.toCanvas(document.getElementById("qr"),u);
  document.getElementById("qrInfo").innerText="🤖 AI QR Mode";
}

// ================= API TESTER =================
async function sendRequest(){
  let url = document.getElementById("apiUrl").value.trim();
  const method = document.getElementById("method").value;
  let bodyText = document.getElementById("body").value.trim();
  const output = document.getElementById("response");

  if(!url){
    output.innerText = "❌ Enter URL";
    return;
  }

  output.innerText = "⏳ Sending...";

  try{
    // ✅ Allow BOTH /ai and full URLs
    if(!url.startsWith("/")){
      new URL(url);
    }

    let options = {
      method: method,
      headers: {"Content-Type":"application/json"}
    };

    // ✅ JSON validation
    if(method !== "GET" && bodyText){
      try{
        JSON.parse(bodyText);
        options.body = bodyText;
      } catch(e){
        output.innerText = "❌ Invalid JSON:\n" + e.message;
        return;
      }
    }

    const res = await fetch(url, options);

    const text = await res.text();

    try{
      const json = JSON.parse(text);
      output.innerText =
        "✅ STATUS: " + res.status + "\n\n" +
        JSON.stringify(json,null,2);
    } catch{
      output.innerText =
        "⚠️ Non-JSON Response:\n\n" + text;
    }

  } catch(err){
    output.innerText = "❌ ERROR:\n" + err.message;
  }
}

</script>

</body>
</html>

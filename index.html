<!DOCTYPE html>
<html>
<head>
  <title>AI Web Runner Test</title>

  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    textarea, input { width: 90%; padding: 10px; margin: 5px; }
    iframe { width: 95%; height: 300px; border: 2px solid black; margin-top: 10px; }
    button { padding: 10px 15px; margin: 5px; }
  </style>
</head>

<body>

<h2>🧪 HTML + Web Runner Test</h2>

<!-- 🌐 INTERNET URL -->
<input id="url" placeholder="https://example.com">
<br>

<button onclick="openSite()">🌍 Open Website</button>
<button onclick="embedSite()">📱 Embed Site</button>

<br><br>

<!-- 💻 HTML RUNNER -->
<textarea id="code" placeholder="<h1>Hello World</h1>"></textarea>
<br>

<button onclick="runHTML()">▶ Run HTML</button>
<button onclick="clearFrame()">🧹 Clear</button>

<!-- OUTPUT -->
<iframe id="preview"></iframe>

<script>

// ===== OPEN IN NEW TAB =====
function openSite(){
  let url = document.getElementById("url").value;
  if(!url.startsWith("http")) url = "https://" + url;
  window.open(url, "_blank");
}

// ===== EMBED INTERNET SITE (SAFE MODE) =====
function embedSite(){
  let url = document.getElementById("url").value;
  if(!url.startsWith("http")) url = "https://" + url;

  document.getElementById("preview").src = url;
}

// ===== RUN HTML CODE LOCALLY =====
function runHTML(){
  const code = document.getElementById("code").value;

  const iframe = document.getElementById("preview");
  iframe.srcdoc = code;
}

// ===== CLEAR =====
function clearFrame(){
  document.getElementById("preview").srcdoc = "";
  document.getElementById("preview").src = "";
}

</script>

</body>
</html>

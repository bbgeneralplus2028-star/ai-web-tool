<!DOCTYPE html>
<html>
<head>
  <title>AI SaaS ULTRA</title>

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { margin:0; font-family:sans-serif; background:#111; color:white; }
    #top { padding:10px; background:#000; }
    #chat { height:300px; overflow:auto; border:1px solid #333; padding:10px; }
    .msg { margin:5px; padding:8px; border-radius:8px; }
    .user { background:#333; }
    .ai { background:#1e3a8a; }
    textarea,input,button { margin:5px; padding:8px; width:95%; }
    iframe { width:100%; height:200px; border:1px solid #444; }
  </style>
</head>

<body>

<div id="top">
  <h2>🚀 AI SaaS ULTRA</h2>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <button onclick="logout()">Logout</button>
  <button onclick="upgrade()">💳 Upgrade</button>

  <!-- CHAT -->
  <div id="chat"></div>
  <input id="input" placeholder="Ask AI...">
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="startVoiceContinuous()">🎤 Auto</button>

  <hr>

  <!-- WEB -->
  <input id="url" placeholder="https://example.com">
  <button onclick="openSite()">Open</button>
  <button onclick="generateQR()">QR</button>
  <canvas id="qrcode"></canvas>

  <hr>

  <!-- HTML / JS -->
  <textarea id="htmlCode" placeholder="HTML"></textarea>
  <button onclick="runHTML()">Run HTML</button>

  <textarea id="jsCode" placeholder="JS"></textarea>
  <button onclick="runJS()">Run JS</button>

  <iframe id="preview"></iframe>

  <hr>

  <!-- FILE -->
  <input type="file" onchange="uploadFile(event)">

  <hr>

  <!-- EDIT -->
  <button onclick="enableEdit()">Edit Page</button>
  <button onclick="enableHighlight()">Highlight</button>

</div>

<script>

// ===== CONFIG =====
const API_URL = "https://ai-web-tool-1.onrender.com/ai";

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ===== AUTH =====
function signup(){ auth.createUserWithEmailAndPassword(email.value,password.value); }
function login(){ auth.signInWithEmailAndPassword(email.value,password.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
    loadChat();
  } else {
    loginBox.style.display="block";
    app.style.display="none";
  }
});

// ===== CHAT =====
async function send(textOverride){
  const text = textOverride || input.value;
  if(!text) return;

  const user = auth.currentUser;

  addMsg("You: "+text,"user");

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt:text, uid:user.uid})
  });

  const data = await res.json();
  const reply = data.result || "Error";

  addMsg("AI: "+reply,"ai");
  speak(reply);

  input.value="";
}

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
}

// ===== VOICE =====
function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function startVoice(){
  const SR=window.SpeechRecognition||webkitSpeechRecognition;
  const r=new SR();
  r.start();
  r.onresult=e=>{
    send(e.results[0][0].transcript);
  };
}

function startVoiceContinuous(){
  const SR=window.SpeechRecognition||webkitSpeechRecognition;
  const r=new SR();
  r.continuous=true;
  r.onresult=e=>{
    send(e.results[e.results.length-1][0].transcript);
  };
  r.start();
}

// ===== WEB =====
function fixURL(u){return u.startsWith("http")?u:"https://"+u;}
function openSite(){window.open(fixURL(url.value));}
function generateQR(){QRCode.toCanvas(qrcode,fixURL(url.value));}

// ===== CODE =====
function runHTML(){preview.srcdoc=htmlCode.value;}
function runJS(){try{new Function(jsCode.value)();}catch(e){alert(e);}}

// ===== FILE =====
function uploadFile(e){
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=async()=>{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt:"Explain this:\n"+r.result})
    });
    const data=await res.json();
    alert(data.result);
  };
  r.readAsText(f);
}

// ===== EDIT =====
function enableEdit(){document.body.contentEditable=true;}
function enableHighlight(){
  document.addEventListener("mouseup",()=>{
    let s=getSelection();
    if(s.rangeCount){
      let span=document.createElement("span");
      span.style.background="yellow";
      try{s.getRangeAt(0).surroundContents(span);}catch(e){}
    }
  });
}

// ===== PAY =====
async function upgrade(){
  const res=await fetch("https://ai-web-tool-1.onrender.com/create-checkout",{method:"POST"});
  const data=await res.json();
  window.location=data.url;
}

</script>

</body>
</html>

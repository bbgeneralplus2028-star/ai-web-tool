<!DOCTYPE html>
<html>
<head>
  <title>AI Browser</title>

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background:#111; color:white; }
    input { width: 80%; padding: 10px; }
    button { padding: 10px 15px; margin: 5px; }
    #chat { margin-top: 20px; text-align: left; max-width: 600px; margin-left:auto; margin-right:auto; }
    .msg { padding: 10px; margin: 5px; border-radius: 8px; }
    .user { background:#333; }
    .ai { background:#1e3a8a; }
  </style>
</head>

<body>

<h2>🤖 AI Browser Chat</h2>

<input id="msg" placeholder="Ask AI...">
<br>

<button onclick="send()">Send</button>

<div id="chat"></div>

<script>

// ======================
// 🔗 YOUR BACKEND (Render)
// ======================
const API_URL = "/ai"; 
// OR: "https://your-app.onrender.com/ai"

// ======================
// 💬 ADD MESSAGE
// ======================
function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

// ======================
// 🤖 SEND TO AI
// ======================
async function send(){
  const input = document.getElementById("msg");
  const text = input.value;

  if(!text) return;

  addMsg("You: " + text, "user");
  input.value = "";

  addMsg("AI: thinking...", "ai");

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ prompt: text })
    });

    const data = await res.json();

    // remove "thinking..."
    document.querySelectorAll(".ai")[document.querySelectorAll(".ai").length-1]
      .innerText = "AI: " + (data.result || "No response");

  } catch(err){
    addMsg("Error: " + err.message, "ai");
  }
}

</script>

</body>
</html>
